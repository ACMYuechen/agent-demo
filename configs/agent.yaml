log_level: info

openai:
  api_key: ${OPENAI_API_KEY}
  base_url: ""
  chat_model: gpt-4o-mini
  embed_model: text-embedding-3-small
  timeout: 60s
  temperature: 0.3
  max_tokens: 2048

milvus:
  endpoint: localhost:19530
  token: ""
  db_name: default
  collection: agent_kb
  vector_dim: 1536
  metric_type: COSINE
  index_type: HNSW
  hnsw_m: 16
  hnsw_ef_construction: 200
  ivf_flat_nlist: 128
  top_k: 5
  score_threshold: 0.0
  search_ef: 64
  search_nprobe: 16
  max_text_length: 8192
  connect_timeout: 10s

agent:
  system_prompt: |
    You are a helpful assistant powered by Eino and Milvus.
    Answer user questions using the provided context when available.
    If tools are available and the question requires computation or real-time data, call the appropriate tool.
    Be concise and cite sources when using retrieved knowledge.
  max_history: 20
  max_tool_steps: 5
  enable_rag: true
  enable_tools: true
  response_timeout: 120s

mcp:
  enabled: false
  host: 0.0.0.0
  port: 8080
  transports:
    - sse
  registry_ttl: 60
